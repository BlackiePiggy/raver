name: RaverMVP
options:
  bundleIdPrefix: com.raver
  deploymentTarget:
    iOS: "17.0"
  postGenCommand: ./scripts/post_xcodegen.sh
settings:
  base:
    SWIFT_VERSION: 5.9
    CURRENT_PROJECT_VERSION: 1
    MARKETING_VERSION: 1.0
    DEVELOPMENT_TEAM: LB3FUV334Z
    CLANG_ENABLE_EXPLICIT_MODULES: NO
    SWIFT_ENABLE_EXPLICIT_MODULES: NO
packages:
  Chat:
    path: ../../../thirdparty/chat
  GiphyUISDK:
    path: ../../../thirdparty/giphy-ios-sdk
targets:
  RaverMVP:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: RaverMVP
    info:
      path: RaverMVP/Info.plist
      properties:
        CFBundleDisplayName: Raver MVP
        UILaunchScreen: {}
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
        NSAppTransportSecurity:
          NSAllowsArbitraryLoads: true
    settings:
      base:
        CODE_SIGN_ENTITLEMENTS: RaverMVP/RaverMVP.entitlements
        PRODUCT_BUNDLE_IDENTIFIER: com.raver.mvp
        TARGETED_DEVICE_FAMILY: "1"
    dependencies:
      - package: Chat
        product: ExyteChat
      - package: GiphyUISDK
        product: GiphyUISDK
  RaverMVPUITests:
    type: bundle.ui-testing
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: RaverMVPUITests
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.raver.mvp.uitests
        GENERATE_INFOPLIST_FILE: YES
    dependencies:
      - target: RaverMVP
schemes:
  RaverMVP:
    build:
      targets:
        RaverMVP: all
    run:
      config: Debug
      environmentVariables:
        RAVER_USE_MOCK: "0"
        RAVER_BFF_BASE_URL: "http://localhost:3901"
    test:
      config: Debug
      gatherCoverageData: false
      targets:
        - name: RaverMVPUITests

name: RaverMVP
options:
  bundleIdPrefix: com.raver
  deploymentTarget:
    iOS: "17.0"
  postGenCommand: ./scripts/post_xcodegen.sh
settings:
  base:
    SWIFT_VERSION: 5.9
    CURRENT_PROJECT_VERSION: 1
    MARKETING_VERSION: 1.0
    DEVELOPMENT_TEAM: LB3FUV334Z
    CLANG_ENABLE_EXPLICIT_MODULES: NO
    SWIFT_ENABLE_EXPLICIT_MODULES: NO
packages:
  Chat:
    path: ../../../thirdparty/chat
  GiphyUISDK:
    path: ../../../thirdparty/giphy-ios-sdk
targets:
  RaverMVP:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: RaverMVP
    info:
      path: RaverMVP/Info.plist
      properties:
        CFBundleDisplayName: Raver MVP
        UILaunchScreen: {}
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
        NSAppTransportSecurity:
          NSAllowsArbitraryLoads: true
        NSPhotoLibraryAddUsageDescription: Raver 需要保存分享海报到你的相册。
        NSPhotoLibraryUsageDescription: Raver 需要访问你的相册以保存分享海报。
        NSLocationWhenInUseUsageDescription: 加入小队线下活动后，Raver 需要使用你的定位来展示队友位置并记录活动轨迹。
        TencentIMAPNSBusinessID: "48505"
        CFBundleURLTypes:
          - CFBundleURLName: com.raver.mvp.deeplink
            CFBundleURLSchemes:
              - raver
    settings:
      base:
        CODE_SIGN_ENTITLEMENTS: RaverMVP/RaverMVP.entitlements
        PRODUCT_BUNDLE_IDENTIFIER: com.raver.mvp
        TARGETED_DEVICE_FAMILY: "1"
    dependencies:
      - package: Chat
        product: ExyteChat
      - package: GiphyUISDK
        product: GiphyUISDK
      - target: RaverCountdownWidgets
        embed: true
      - target: RaverNotificationService
        embed: true
  RaverCountdownWidgets:
    type: app-extension
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: RaverCountdownWidgets
      - path: RaverMVP/Core/Widget/WidgetSelectableEvent.swift
      - path: RaverMVP/Core/Widget/WidgetSelectableEventsStore.swift
    info:
      path: RaverCountdownWidgets/Info.plist
      properties:
        CFBundleDisplayName: Raver Countdown
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension
    settings:
      base:
        APPLICATION_EXTENSION_API_ONLY: YES
        CODE_SIGN_ENTITLEMENTS: RaverCountdownWidgets/RaverCountdownWidgets.entitlements
        PRODUCT_BUNDLE_IDENTIFIER: com.raver.mvp.countdownwidgets
        TARGETED_DEVICE_FAMILY: "1"
  RaverNotificationService:
    type: app-extension
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: RaverNotificationService
    info:
      path: RaverNotificationService/Info.plist
      properties:
        CFBundleDisplayName: Raver Notification Service
        NSExtension:
          NSExtensionPointIdentifier: com.apple.usernotifications.service
          NSExtensionPrincipalClass: $(PRODUCT_MODULE_NAME).NotificationService
    settings:
      base:
        APPLICATION_EXTENSION_API_ONLY: YES
        CODE_SIGN_ENTITLEMENTS: RaverNotificationService/RaverNotificationService.entitlements
        PRODUCT_BUNDLE_IDENTIFIER: com.raver.mvp.notificationservice
        TARGETED_DEVICE_FAMILY: "1"
  RaverMVPUITests:
    type: bundle.ui-testing
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: RaverMVPUITests
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.raver.mvp.uitests
        GENERATE_INFOPLIST_FILE: YES
    dependencies:
      - target: RaverMVP
schemes:
  RaverMVP:
    build:
      targets:
        RaverMVP: all
    run:
      config: Debug
      executable: RaverMVP
      environmentVariables:
        RAVER_USE_MOCK: "0"
        RAVER_BFF_BASE_URL: "https://api.ravehub.top"
    test:
      config: Debug
      gatherCoverageData: false
      targets:
        - name: RaverMVPUITests

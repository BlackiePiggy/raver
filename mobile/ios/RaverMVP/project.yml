name: RaverMVP
options:
  bundleIdPrefix: com.raver
  deploymentTarget:
    iOS: "17.0"
settings:
  base:
    SWIFT_VERSION: 5.9
targets:
  RaverMVP:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: RaverMVP
    info:
      path: RaverMVP/Info.plist
      properties:
        CFBundleDisplayName: Raver MVP
        UILaunchScreen: {}
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
        NSAppTransportSecurity:
          NSAllowsArbitraryLoads: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.raver.mvp
        TARGETED_DEVICE_FAMILY: "1"
schemes:
  RaverMVP:
    build:
      targets:
        RaverMVP: all
    run:
      config: Debug
      environmentVariables:
        RAVER_USE_MOCK: "0"
        RAVER_BFF_BASE_URL: "http://localhost:3001"
